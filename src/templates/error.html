{% extends "base.html" %}

{% block title %}{{ status_code }} - COMPEITO{% endblock %}

{% block heading %}{{ message }}{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm border border-stone-200 px-6 py-8">
    <p class="text-6xl font-bold text-stone-200 mb-4">{{ status_code }}</p>
    {% if detail %}
    <p class="text-stone-500 mb-6">{{ detail }}</p>
    {% endif %}
    <a href="/" class="text-violet-600 hover:text-violet-800 transition-colors">{{ t("return_to_top") }}</a>
</div>
{% endblock %}
