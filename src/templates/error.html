{% extends "base.html" %}

{% block title %}{{ status_code }} - CASE Server{% endblock %}

{% block heading %}{{ message }}{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow px-6 py-8">
    <p class="text-6xl font-bold text-gray-300 mb-4">{{ status_code }}</p>
    {% if detail %}
    <p class="text-gray-500 mb-6">{{ detail }}</p>
    {% endif %}
    <a href="/" class="text-blue-600 hover:text-blue-800">トップページに戻る</a>
</div>
{% endblock %}
