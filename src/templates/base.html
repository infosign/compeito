<!DOCTYPE html>
<html lang="{{ lang|default('en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}COMPEITO{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [data-tree-item] { transition: background-color 0.15s ease, box-shadow 0.15s ease; }
        .logo-text {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to right, #8B5CF6, #EC4899, #F59E0B, #10B981, #0EA5E9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.08em;
        }
    </style>
    <script>
    document.addEventListener('htmx:beforeSwap', function(evt) {
        if (evt.detail.xhr.status >= 400) {
            evt.detail.shouldSwap = true;
            evt.detail.isError = false;
        }
    });
    function formatLocalDates(root) {
        (root || document).querySelectorAll('time[datetime]').forEach(function(el) {
            var d = new Date(el.getAttribute('datetime'));
            if (!isNaN(d)) {
                el.textContent = d.toLocaleString(document.documentElement.lang || undefined, {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
                });
            }
        });
    }
    document.addEventListener('DOMContentLoaded', function() { formatLocalDates(); });
    document.addEventListener('htmx:afterSettle', function(evt) { formatLocalDates(evt.detail.elt); });
    </script>
</head>
<body class="bg-stone-50 min-h-screen">
    <header class="bg-gradient-to-r from-violet-50 via-white to-pink-50 border-b border-violet-100/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            {% block breadcrumb %}{% endblock %}
            <h1 class="text-2xl font-bold text-gray-800 flex items-start md:items-center gap-3">{% block header_icon %}<a href="/" class="shrink-0"><img src="/static/logo.svg" alt="COMPEITO" class="h-7 w-7"></a>{% endblock %}<span class="min-w-0">{% block heading %}{% endblock %}</span></h1>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
